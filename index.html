<!DOCTYPE html>
<html lang="si">
<head>
    <title>මගේ AI Bot - Netlify</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {font-family: 'Segoe UI', Arial; background: #343541; color: white; margin: 0; padding: 0;}
        #chatbox {max-width: 700px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box;}
        #messages {flex: 1; overflow-y: auto; padding: 20px; background: #444654; border-radius: 10px; margin-bottom: 10px;}
        .msg {margin: 10px 0; padding: 12px 16px; border-radius: 8px; max-width: 80%; line-height: 1.5; word-wrap: break-word;}
        .user {background: #565869; margin-left: auto; text-align: right;}
        .ai {background: #40414f; margin-right: auto;}
        .typing {opacity: 0.7; font-style: italic;}
        #input-area {display: flex; gap: 8px;}
        #msgInput {flex: 1; padding: 14px; border: none; border-radius: 8px; background: #40414f; color: white; font-size: 16px; outline: none;}
        #msgInput:focus {border: 1px solid #10a37f;}
        button {padding: 14px 24px; border: none; border-radius: 8px; background: #10a37f; color: white; cursor: pointer; font-weight: bold; font-size: 16px;}
        button:disabled {background: grey; cursor: not-allowed;}
        h2 {text-align: center; margin-top: 0; margin-bottom: 20px;}
    </style>
</head>
<body>
    <div id="chatbox">
        <h2>🤖 Groq Llama3 - Netlify</h2>
        <div id="messages">
            <div class="msg ai">ආයුබෝවන්! මොනවාහරි අහපන්.</div>
        </div>
        <div id="input-area">
            <input type="text" id="msgInput" placeholder="Type a message... Enter ගහන්න">
            <button onclick="sendMsg()" id="sendBtn">Send</button>
        </div>
    </div>

<script>
async function sendMsg() {
    const input = document.getElementById('msgInput');
    const btn = document.getElementById('sendBtn');
    const msg = input.value.trim();
    if(!msg) return;

    addMsg(msg, 'user');
    input.value = '';
    btn.disabled = true;

    const typingId = addMsg('Typing...', 'ai', 'typing');

    try {
        console.log("Sending to /api/chat"); // Debug එකට
        const res = await fetch('/api/chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({message: msg})
        });

        if(!res.ok) {
            throw new Error('Server error: ' + res.status);
        }

        const data = await res.json();
        document.getElementById(typingId).remove();
        addMsg(data.reply || 'Reply එක හිස්', 'ai');
    } catch (error) {
        console.error("Error:", error); // Console එකේ error බලන්න
        document.getElementById(typingId).remove();
        addMsg('Error! API එකට connect වෙන්න බැරි උනා. Netlify logs check කරපන්.', 'ai');
    }
    
    btn.disabled = false;
    input.focus();
}

function addMsg(text, sender, cls='') {
    const div = document.createElement('div');
    const id = 'msg' + Date.now();
    div.id = id;
    // මෙතන bug එක fix කරේ - ' + cls එකතු කරේ
    div.className = 'msg ' + sender + ' + cls;
    div.innerText = text;
    document.getElementById('messages').appendChild(div);
    document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    return id;
}

document.getElementById('msgInput').addEventListener('keypress', e => {
    if(e.key === 'Enter') sendMsg();
});
</script>
</body>
</html>
